<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Calcite components: Create a mapping app</title>

    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <calcite-loader
      label="loading"
      text="Loading..."
      id="app-loader"
    ></calcite-loader>

    <calcite-shell content-behind>
      <calcite-navigation slot="header">
        <calcite-navigation-logo
          id="header-title"
          heading-level="1"
          slot="logo"
        >
        </calcite-navigation-logo>
      </calcite-navigation>

      <calcite-shell-panel slot="panel-start" display-mode="float-content">
        <calcite-action-bar slot="action-bar">
          <calcite-action
            data-action-id="layers"
            icon="layers"
            text="Layers"
          ></calcite-action>
          <calcite-action
            data-action-id="basemaps"
            icon="basemap"
            text="Basemaps"
          ></calcite-action>
          <calcite-action
            data-action-id="legend"
            icon="legend"
            text="Legend"
          ></calcite-action>
          <calcite-action
            data-action-id="bookmarks"
            icon="bookmark"
            text="Bookmarks"
          ></calcite-action>
          <calcite-action
            data-action-id="print"
            icon="print"
            text="Print"
          ></calcite-action>
          <calcite-action
            data-action-id="information"
            icon="information"
            text="Information"
          ></calcite-action>
        </calcite-action-bar>

        <!-- Map-specific panels (each one provides a div for a ArcGIS Maps SDK for JavaScript widget) -->
        <calcite-panel
          heading="Layers"
          height-scale="l"
          data-panel-id="layers"
          closed
          closable
        >
          <arcgis-layer-list
            drag-enabled
            reference-element="mapElement"
            visibility-appearance="checkbox"
          ></arcgis-layer-list>
        </calcite-panel>
        <calcite-panel
          heading="Basemaps"
          height-scale="5"
          data-panel-id="basemaps"
          closed
          closable
        >
          <arcgis-basemap-gallery
            reference-element="mapElement"
          ></arcgis-basemap-gallery>
        </calcite-panel>
        <calcite-panel
          heading="Legend"
          height-scale="l"
          data-panel-id="legend"
          closed
          closable
        >
          <arcgis-legend
            legend-style="classic"
            reference-element="mapElement"
          ></arcgis-legend>
        </calcite-panel>
        <calcite-panel
          heading="Bookmarks"
          height-scale="l"
          data-panel-id="bookmarks"
          closed
          closable
        >
          <arcgis-bookmarks
            editing-enabled="false"
            reference-element="mapElement"
          ></arcgis-bookmarks>
        </calcite-panel>
        <calcite-panel
          heading="Print"
          height-scale="l"
          data-panel-id="print"
          closed
          closable
        >
          <arcgis-print
            allowed-formats="all"
            allowed-layouts="all"
            include-default-templates="false"
            reference-element="mapElement"
          ></arcgis-print>
        </calcite-panel>

        <!-- Info panel (populates with info from the web map) -->
        <calcite-panel
          heading="Details"
          data-panel-id="information"
          closed
          closable
        >
          <div id="info-content">
            <img id="item-thumbnail" alt="webmap thumbnail" />
            <div id="item-description">
              <!-- Dynamically populated -->
            </div>
            <calcite-label layout="inline">
              <b>Rating:</b>
              <calcite-rating id="item-rating" read-only>
                <!-- Dynamically populated -->
              </calcite-rating>
            </calcite-label>
          </div>
        </calcite-panel>
      </calcite-shell-panel>
      <arcgis-map id="mapElement" item-id="210c5b77056846808c7a5ce93920be81">
        <arcgis-zoom slot="top-right"></arcgis-zoom>
      </arcgis-map>
    </calcite-shell>
  </body>

  <script type="module" src="index.js"></script>
</html>
