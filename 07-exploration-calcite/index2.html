<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Calcite components: Core concepts</title>

    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }

      :root {
        --calcite-shell-border-color: red;
      }
    </style>
  </head>
  <body>
    <calcite-shell content-behind>
      <calcite-navigation slot="header">
        <calcite-navigation-logo
          heading="Sample Application"
          icon="clustering"
          alt="Application logo"
          slot="logo"
        >
        </calcite-navigation-logo>
      </calcite-navigation>
      <calcite-shell-panel slot="panel-end" display-mode="float">
        <calcite-panel heading="Maps details">
          <calcite-block heading="Block 1" collapsible>
            <calcite-notice open>
              <div slot="message">Sample block content</div>
            </calcite-notice>
          </calcite-block>
          <calcite-block heading="Block 2" collapsible>
            <calcite-notice open>
              <div slot="message">Sample block content</div>
            </calcite-notice>
          </calcite-block>
        </calcite-panel>
      </calcite-shell-panel>
      <arcgis-map
        item-id="05e015c5f0314db9a487a9b46cb37eca"
        zoom="7"
        basemap="terrain"
      >
      </arcgis-map>
    </calcite-shell>
  </body>
</html>
