<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>ArcGIS Maps SDK for JavaScript Tutorials: Display a web scene</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
    <script>
      var esriConfig = {
        apiKey:
          "BASE_MAP",
      };
    </script>
    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
  </head>

  <body>
    <arcgis-scene
      item-id="579f97b2f3b94d4a8e48a5f140a6639b"
      basemap="arcgis/topographic"
      ground="world-elevation"
      camera-position="-118.808, 33.961, 2000"
      camera-tilt="75"
    >
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-navigation-toggle slot="top-left"></arcgis-navigation-toggle>

      <arcgis-legend slot="top-right" legend-style="classic"></arcgis-legend>
    </arcgis-scene>
  </body>
</html>
