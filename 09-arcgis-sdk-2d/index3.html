<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>
      ArcGIS Maps SDK for JavaScript Tutorials: Using a View with map components
      and Calcite components.
    </title>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>

    <script type="module" src="https://js.arcgis.com/5.0/"></script>
  </head>

  <body>
    <arcgis-map
      basemap="arcgis/topographic"
      center="-118.805, 34.020"
      zoom="13"
    >
      <arcgis-zoom slot="top-left"></arcgis-zoom>
    </arcgis-map>

    <script type="module"></script>
  </body>
</html>
