<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>
      ArcGIS Maps SDK for JavaScript Tutorials: Using a View with map components
      and Calcite components.
    </title>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
  </head>

  <body>
    <calcite-shell>
      <calcite-navigation slot="header">
        <calcite-navigation-logo
          slot="logo"
          target="_blank"
        ></calcite-navigation-logo>
      </calcite-navigation>

      <arcgis-scene
        basemap="arcgis/topographic"
        ground="world-elevation"
        camera-position="-118.808, 33.961, 2000"
        camera-tilt="75"
      >
      </arcgis-scene>
    </calcite-shell>
    <calcite-loader></calcite-loader>

    <script type="module">

    </script>
  </body>
</html>
